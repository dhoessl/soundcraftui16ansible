---
- name: "Setup base directories"
  become: true
  ansible.builtin.file:
    path: "{{ structure_base_path }}/{{ item.name }}"
    state: "directory"
    owner: "{{ item.owner | default(ansible_facts['user_id']) }}"
    group: "{{ item.group | default(ansible_facts['user_gid']) }}"
    mode: "0755"
  loop:
    - name: "log"
    - name: "mqtt"
    - name: "database"
    - name: "nodejs"
    - name: "config"

- name: "Setup some default config"
  become: true
  ansible.builtin.template:
    src: "templates/{{ item.name }}.j2"
    dest: "{{ structure_base_path }}/config/{{ item.name }}"
    owner: "{{ item.owner | default(ansible_facts['user_id']) }}"
    group: "{{ item.group | default(ansible_facts['user_gid']) }}"
    mode: "{{ item.mode | default('0644') }}"
  loop: []
...
